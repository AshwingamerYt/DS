<!DOCTYPE html>
<html>

<head>
    <title>AJAX Example</title>
</head>

<body align="center">

    <h1>AJAX Practical</h1>

    <button onclick="loadData()">
        Load Data
    </button>

    <h2 id="result"></h2>

    <script>

        function loadData()
        {
            var xhttp = new XMLHttpRequest();

            xhttp.onload = function()
            {
                document.getElementById("result").innerHTML =
                this.responseText;
            }

            xhttp.open("GET", "data.txt", true);

            xhttp.send();
        }

    </script>

</body>
</html>
