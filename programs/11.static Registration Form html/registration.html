<!DOCTYPE html>
<html>

<head>
    <title>Registration Form</title>
</head>

<body>

    <h2 align="center">Student Registration Form</h2>

    <form>

        Name:
        <input type="text">
        <br><br>

        Email:
        <input type="email">
        <br><br>

        Password:
        <input type="password">
        <br><br>

        Mobile Number:
        <input type="number">
        <br><br>

        Gender:
        <input type="radio" > Male
        <input type="radio" > Female
        <br><br>

        Course:
        <select>
            <option>BCA</option>
            <option>BSc</option>
            <option>BBA</option>
        </select>
        <br><br>

        Address:
        <br>
        <textarea rows="4" cols="30"></textarea>
        <br><br>

        <input type="submit" >

    </form>

</body>
</html>
