<!DOCTYPE html>
<html>

<head>
    <title>User Registration Form</title>
</head>

<body>

    <h2 align="center">User Registration Form</h2>

    <form>

        Name:
        <input type="text">
        <br><br>

        Password:
        <input type="password">
        <br><br>

        Email:
        <input type="email">
        <br><br>

        Phone Number:
        <select>
            <option>+91</option>
            <option>+1</option> 
            <option>+44</option>
        </select>

       <input type="tel" pattern="[0-9]{10}" maxlength="10" required>
        <br><br>

        Gender:
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        Date of Birth:

        <select>
            <option>Date</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
        </select>

        <select>
            <option>Month</option>
            <option>January</option>
            <option>February</option>
            <option>March</option>
        </select>

        <select>
            <option>Year</option>
            <option>2001</option>
            <option>2002</option>
            <option>2003</option>
        </select>

        <br><br>

        Languages Known:
        <input type="checkbox"> English 
        <input type="checkbox"> Marathi
        <input type="checkbox"> Hindi
        <input type="checkbox"> Tamil

        <br><br>

        Address:
        <br>
        <textarea rows="4" cols="30"></textarea>

        <br><br>

        <input type="submit" value="Register">

    </form>

</body>
</html>
