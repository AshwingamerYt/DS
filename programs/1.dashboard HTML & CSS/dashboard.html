<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <style>

        body{
            text-align:center;
            font-family:Arial;
            background-color:lightgray;
        }

        h1{
            background-color:blue;
            color:white;
            padding:15px;
        }

        .box{
            width:200px;
            padding:20px;
            margin:10px;
            display:inline-block;
            color:white;
            border-radius:10px;
        }

        .student{
            background-color:green;
        }

        .teacher{
            background-color:orange;
        }

        .course{
            background-color:red;
        }

    </style>
</head>

<body>

    <h1>College Dashboard</h1>

    <div class="box student">
        <h2>Students</h2>
        <p>500</p>
    </div>

    <div class="box teacher">
        <h2>Teachers</h2>
        <p>50</p>
    </div>

    <div class="box course">
        <h2>Courses</h2>
        <p>20</p>
    </div>

</body>
</html>
