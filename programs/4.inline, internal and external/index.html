<!DOCTYPE html>
<html>

<head>

    <title>CSS Types</title>

    <!-- Internal CSS -->
    <style>

        h2{
            color: blue;
        }

    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color:red;">
        Inline CSS Example
    </h1>

    <!-- Internal CSS -->
    <h2>
        Internal CSS Example
    </h2>

    <!-- External CSS -->
    <p>
        External CSS Example
    </p>

</body>
</html>
