<!DOCTYPE html>
<html>

<head>
    <title>Login Page</title>

    <style>

        body{
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        form{   
            border: 1px solid black;
            width: 300px;
            margin: auto;
            padding: 20px;
        }

        input{  
            width: 90%;
            padding: 8px;
        }

    </style>
</head>

<body>

    <form>

        <h2>Login Form</h2>

        Username:
        <br><br>

        <input type="text"
        pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[@#$%]).{8,}"
        title="Username must contain capital, small, number, special character and minimum 8 characters"
        required>

        <br><br>

        Password:
        <br><br>

        <input type="password"
        pattern="(?=.*[A-Z])(?=.*[@#$%]).{8,}"
        title="Password must contain capital letter, special character and minimum 8 characters"
        required>

        <br><br>

        <input type="submit" value="Login">

    </form>

</body>
</html>
